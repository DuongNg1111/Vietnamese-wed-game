<!-- game2.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>game2.html - Color Memory Challenge</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#eef8ea;
    display:flex;
    flex-direction: column; /* Stacks back button box vertically */
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* Floating layout container for back navigation link */
.back-btn-container {
    width: 100%;
    max-width: 700px;
    margin-bottom: 15px;
    text-align: left;
}

.back-btn {
    background: rgba(88, 204, 2, 0.1);
    color: #46b000;
    border: 2px solid #58cc02;
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: .2s;
    text-decoration: none;
    display: inline-block;
}

.back-btn:hover {
    background: #58cc02;
    color: #fff;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:24px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
}

h1{
    color:#58cc02;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

#questionNumber{
    font-size:20px;
    color:#555;
    margin-bottom:10px;
}

#instruction{
    font-size:26px;
    color:#58cc02;
    font-weight:bold;
    min-height:40px;
    margin-bottom:15px;
}

#countdown{
    font-size:40px;
    color:#ff9800;
    font-weight:bold;
    min-height:55px;
    margin-bottom:20px;
}

.grid{
    width:340px;
    max-width:100%;
    margin:0 auto 25px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.square{
    aspect-ratio:1;
    border-radius:22px;
    border:4px solid transparent;
    cursor:pointer;
    transition:.25s;
}

.square.hiddenColor{
    background:#bdbdbd !important;
}

.square.clickable:hover{
    transform:translateY(-4px) scale(1.03);
    box-shadow:0 8px 18px rgba(0,0,0,.18);
}

.greenBorder{
    border-color:#2ecc71 !important;
}

.redBorder{
    border-color:#e74c3c !important;
}

#message{
    min-height:34px;
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.correct{
    color:#2ecc71;
}

.wrong{
    color:#e74c3c;
}

button{
    background:#58cc02;
    color:white;
    border:none;
    border-radius:16px;
    padding:14px 32px;
    font-size:18px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#46b000;
    transform:translateY(-2px);
}

.hidden{
    display:none;
}

.score{
    font-size:42px;
    color:#58cc02;
    margin:20px 0;
    font-weight:bold;
}

.performance{
    font-size:28px;
    color:#555;
    margin-bottom:30px;
}

@media(max-width:600px){

.container{
    padding:20px;
}

.grid{
    width:280px;
    gap:14px;
}

}
</style>
</head>
<body>

<!-- Pulls back up out of color/ and out of GAMES/ to reach index.html root lobby -->
<div class="back-btn-container">
    <a href="../../index.html" class="back-btn">⬅ Back to Lobby</a>
</div>

<div class="container">

<div id="gameScreen">

<h1>Color Memory Challenge</h1>

<div class="subtitle">
Memorize the colors, then choose the correct one after they disappear.
</div>

<div id="questionNumber"></div>

<div id="instruction"></div>

<div id="countdown"></div>

<div class="grid" id="grid"></div>

<div id="message"></div>

<button id="nextBtn" class="hidden"></button>

</div>

<div id="resultScreen" class="hidden">

<h1>Great Job!</h1>

<div style="font-size:28px;color:#666;margin-top:20px;">
Memory Score
</div>

<div class="score" id="scoreText"></div>

<div class="performance" id="performance"></div>

<button id="restartBtn">Play Again</button>

</div>

</div>

<script>
// ===============================
// Vocabulary
// ===============================
const COLORS=[
{text:"Màu đỏ",color:"red"},
{text:"Màu cam",color:"orange"},
{text:"Màu vàng",color:"yellow"},
{text:"Màu hồng",color:"hotpink"},
{text:"Màu xanh lá",color:"limegreen"},
{text:"Màu đen",color:"black"},
{text:"Màu trắng",color:"white"}
];

// Game state
let questions=[];
let currentQuestion=0;
let score=0;
let answered=false;

// DOM
const grid=document.getElementById("grid");
const instruction=document.getElementById("instruction");
const countdown=document.getElementById("countdown");
const questionNumber=document.getElementById("questionNumber");
const message=document.getElementById("message");
const nextBtn=document.getElementById("nextBtn");

const gameScreen=document.getElementById("gameScreen");
const resultScreen=document.getElementById("resultScreen");

// Shuffle array
function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

// Generate all questions
function generateQuestions(){

    questions=[];

    for(let i=0;i<10;i++){

        let pool=[...COLORS];
        shuffle(pool);

        const four=pool.slice(0,4);

        shuffle(four);

        const answerIndex=Math.floor(Math.random()*4);

        questions.push({
            colors:four,
            answerIndex
        });

    }

}

// Start game
function startGame(){

    generateQuestions();

    currentQuestion=0;
    score=0;

    resultScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");

    loadQuestion();

}

// Build grid
function loadQuestion(){

    answered=false;

    message.textContent="";
    message.className="";

    nextBtn.classList.add("hidden");

    const q=questions[currentQuestion];

    questionNumber.textContent=`Question ${currentQuestion+1} / 10`;

    instruction.textContent="Remember these colors!";

    grid.innerHTML="";

    q.colors.forEach((item,index)=>{

        const div=document.createElement("div");

        div.className="square";

        div.dataset.index=index;

        div.style.background=item.color;

        if(item.color==="white"){
            div.style.border="4px solid #bbb";
        }

        grid.appendChild(div);

    });

    startCountdown();

}

// Countdown
function startCountdown(){

    let count=3;

    countdown.textContent=count;

    const timer=setInterval(()=>{

        count--;

        if(count>0){
            countdown.textContent=count;
        }else{

            clearInterval(timer);

            countdown.textContent="";

            hideColors();

        }

    },1000);

}

// Hide colors
function hideColors(){

    const q=questions[currentQuestion];

    instruction.innerHTML=`Where is<br><br><strong>"${q.colors[q.answerIndex].text}"</strong>`;

    [...grid.children].forEach(square=>{

        square.classList.add("hiddenColor");
        square.classList.add("clickable");

        square.onclick=()=>selectAnswer(square);

    });

}

// Reveal colors
function revealColors(){

    const q=questions[currentQuestion];

    [...grid.children].forEach((square,index)=>{

        square.classList.remove("hiddenColor");
        square.classList.remove("clickable");

        square.style.background=q.colors[index].color;

        if(q.colors[index].color==="white"){
            square.style.border="4px solid #bbb";
        }

    });

}

// Handle answer
function selectAnswer(square){

    if(answered) return;

    answered=true;

    revealColors();

    const q=questions[currentQuestion];

    const chosen=Number(square.dataset.index);

    const correctSquare=grid.children[q.answerIndex];

    if(chosen===q.answerIndex){

        score++;

        message.textContent="✅ Correct!";
        message.className="correct";

        correctSquare.classList.add("greenBorder");

    }else{

        message.textContent="❌ Wrong!";
        message.className="wrong";

        correctSquare.classList.add("greenBorder");

        square.classList.add("redBorder");

    }

    nextBtn.classList.remove("hidden");

    if(currentQuestion===9){
        nextBtn.textContent="Finish";
    }else{
        nextBtn.textContent="Next Question →";
    }

}

// Next
nextBtn.onclick=function(){

    currentQuestion++;

    if(currentQuestion>=10){

        showResults();

    }else{

        loadQuestion();

    }

};

// Results
function showResults(){

    gameScreen.classList.add("hidden");
    resultScreen.classList.remove("hidden");

    document.getElementById("scoreText").textContent=`${score} / 10`;

    let text="";

    if(score===10){
        text="Perfect Memory!";
    }else if(score>=8){
        text="Excellent!";
    }else if(score>=6){
        text="Good Job!";
    }else{
        text="Keep Practicing!";
    }

    document.getElementById("performance").textContent=text;

}

// Restart
document.getElementById("restartBtn").onclick=startGame;

// Start
startGame();

</script>

</body>
</html>
